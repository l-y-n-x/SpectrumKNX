name: CI (Test & Lint)


env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 3.12 is the minimum supported version (FreeBSD port, see issue #274),
        # 3.13 is what the Debian package targets (Debian 13, see PACKAGING.md),
        # 3.14 is what the Docker image ships.
        python-version: ['3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt


      - name: Run Tests with Pytest
        run: |
          cd backend
          # Mock database for unit tests
          export DATABASE_URL=sqlite+aiosqlite:///unittest.db
          # Ensure modules are found from the root of the backend folder
          export PYTHONPATH=.
          python -m pytest tests/

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Lint
        run: |
          cd frontend
          npm run lint

      - name: Build
        run: |
          cd frontend
          npm run build
