version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    groups:
      dependencies:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
    groups:
      pydantic:
        patterns:
          - "pydantic"
          - "pydantic_core"
          - "pydantic-core"
      dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "pydantic"
          - "pydantic_core"
          - "pydantic-core"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
