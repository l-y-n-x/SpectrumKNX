services:
  # Development-specific overrides for the backend
  backend:
    build:
      context: ./backend
    volumes:
      - ./project:/project
      - ./backend:/app
    environment:
      - APP_VERSION=${APP_VERSION:-dev}

  # The frontend service is only needed in development (Vite HMR)
  frontend:
    build:
      context: ./frontend
    container_name: knx_frontend
    environment:
      - VITE_BACKEND_URL=http://backend:8000
      - VITE_APP_VERSION=${APP_VERSION:-dev}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped
