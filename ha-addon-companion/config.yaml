name: "Spectrum KNX (HA Companion)"
description: "KNX analyzer UI on top of Home Assistant's own KNX telegram history — no second bus connection, no separate database"
# Shares the image built from ha-addon/ — keep version in sync with ha-addon/config.yaml
version: "1.14.0"
slug: "spectrum_knx_companion"
image: "ghcr.io/martinhoefling/spectrum-knx-addon-{arch}"
init: false
arch:
  - aarch64
  - amd64
ingress: true
ingress_port: 8000
ingress_stream: true
panel_icon: mdi:database-eye
panel_title: "Spectrum KNX (HA)"
panel_admin: true
# Read HA's KNX telegram database (rw mount: sqlite WAL/locking needs a writable
# directory even though the database itself is opened read-only)
map:
  - homeassistant_config:rw
# Access to the core websocket API for the live telegram bridge
homeassistant_api: true
options:
  COMPANION_MODE: true
  LIVE_SOURCE: "ha_websocket"
  TELEGRAM_DB_PATH: ""
  LOG_LEVEL: "INFO"
  UPDATE_CHECK: true
schema:
  COMPANION_MODE: "bool"
  LIVE_SOURCE: "list(ha_websocket|poll|none)"
  TELEGRAM_DB_PATH: "str?"
  LOG_LEVEL: "list(DEBUG|INFO|WARNING|ERROR|CRITICAL)"
  UPDATE_CHECK: "bool"
